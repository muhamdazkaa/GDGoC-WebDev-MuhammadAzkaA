<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <span class="brand">StarQuest 2026</span>
            <button id="theme-toggle">🌓 Mode</button>
        </nav>
    </header>

    <main class="main-content">
        <div class="form-container">
            <h2>Event Registration</h2>
            
            <form id="regForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="nama" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-flex">
                        <label><input type="radio" name="gender" value="Male" required> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="phone-box">
                        <span class="prefix">+62</span>
                        <input type="tel" id="phone" placeholder="812345678" required>
                    </div>
                </div>

                <button type="submit" class="btn-register">Register</button>
            </form>

            <div id="success-msg" class="hidden">
                ✅ Registrasi Berhasil Disimpan!
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Registration Portal. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
